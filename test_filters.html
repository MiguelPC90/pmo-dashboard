<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teste Filtros</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;padding:20px;background:#f0f0f0}
h2{margin-bottom:16px;color:#002E5E}
.bar{background:#fff;padding:12px;border-radius:8px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;position:relative;z-index:10}
.ms-wrap{position:relative;min-width:150px}
.ms-btn{width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;text-align:left;font-size:13px;display:flex;justify-content:space-between}
.ms-btn:hover{background:#f5f5f5}
.ms-dropdown{position:fixed;min-width:180px;background:#fff;border:1px solid #ccc;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;display:none;max-height:240px;overflow-y:auto}
.ms-dropdown.open{display:block}
.ms-option{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px}
.ms-option:hover{background:#f5f5f5}
.ms-option input{width:14px;height:14px;cursor:pointer}
.ms-clear{padding:7px 12px;border-top:1px solid #eee;font-size:12px;color:#888;cursor:pointer;text-align:center}
.ms-clear:hover{background:#f5f5f5;color:#c00}
.result{background:#fff;padding:16px;border-radius:8px;font-size:13px}
.result pre{background:#f5f5f5;padding:10px;border-radius:4px;margin-top:8px;font-size:12px;white-space:pre-wrap}
</style>
</head>
<body>
<h2>Teste de Filtros Multi-selecção</h2>

<div class="bar">
  <div class="ms-wrap" id="wrap-eixo">
    <div style="font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase">Eixo</div>
    <button class="ms-btn" id="btn-eixo" onclick="toggle('eixo')">
      <span id="lbl-eixo">Todos</span><span>▾</span>
    </button>
    <div class="ms-dropdown" id="dd-eixo"></div>
  </div>

  <div class="ms-wrap" id="wrap-plano">
    <div style="font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase">Plano</div>
    <button class="ms-btn" id="btn-plano" onclick="toggle('plano')">
      <span id="lbl-plano">Todos</span><span>▾</span>
    </button>
    <div class="ms-dropdown" id="dd-plano"></div>
  </div>

  <div class="ms-wrap" id="wrap-owner">
    <div style="font-size:11px;color:#888;margin-bottom:3px;text-transform:uppercase">Owner</div>
    <button class="ms-btn" id="btn-owner" onclick="toggle('owner')">
      <span id="lbl-owner">Todos</span><span>▾</span>
    </button>
    <div class="ms-dropdown" id="dd-owner"></div>
  </div>

  <button onclick="resetAll()" style="padding:8px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;align-self:flex-end">✕ Limpar</button>
</div>

<div class="result">
  <strong>Filtros activos:</strong>
  <pre id="output">Nenhum</pre>
  <strong>Actividades visíveis: <span id="count">—</span></strong>
</div>

<script>
const DATA = [
  {n1:'Eixo 1',n2:'#1 Plano de acção 1',owner:'DAP'},
  {n1:'Eixo 1',n2:'#1 Plano de acção 1',owner:'DSI'},
  {n1:'Eixo 1',n2:'#2 Plano de acção 2',owner:'DCH'},
  {n1:'Eixo 2',n2:'#3 Plano de acção 3',owner:'DAP'},
  {n1:'Eixo 2',n2:'#3 Plano de acção 3',owner:'DBA'},
  {n1:'Eixo 2',n2:'#4 Plano de acção 4 (com & especiais | #chars)',owner:'DVFP'},
  {n1:'Eixo 3',n2:'#5 Plano de acção 5',owner:'GIT'},
];

const SEL = {eixo:new Set(), plano:new Set(), owner:new Set()};

function buildDd(id, vals){
  const dd = document.getElementById('dd-'+id);
  dd.innerHTML = '';
  vals.forEach(v => {
    const row = document.createElement('div');
    row.className = 'ms-option';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = SEL[id].has(v);
    cb.addEventListener('change', function(){
      if(this.checked) SEL[id].add(v); else SEL[id].delete(v);
      updateLabel(id);
      applyFilters();
    });
    const sp = document.createElement('span');
    sp.textContent = v;
    row.appendChild(cb); row.appendChild(sp);
    dd.appendChild(row);
  });
  const clr = document.createElement('div');
  clr.className = 'ms-clear';
  clr.textContent = 'Limpar';
  clr.addEventListener('click', () => { SEL[id].clear(); buildDd(id, vals); updateLabel(id); applyFilters(); });
  dd.appendChild(clr);
}

function updateLabel(id){
  const s = SEL[id];
  document.getElementById('lbl-'+id).textContent = s.size===0?'Todos':s.size===1?[...s][0].substring(0,20):s.size+' seleccionados';
}

function toggle(id){
  document.querySelectorAll('.ms-dropdown').forEach(d=>{ if(d.id!=='dd-'+id) d.classList.remove('open'); });
  const dd = document.getElementById('dd-'+id);
  const btn = document.getElementById('btn-'+id);
  const rect = btn.getBoundingClientRect();
  dd.style.top = (rect.bottom+2)+'px';
  dd.style.left = rect.left+'px';
  dd.style.minWidth = rect.width+'px';
  dd.classList.toggle('open');
}

document.addEventListener('click', e => {
  if(!e.target.closest('.ms-wrap')) document.querySelectorAll('.ms-dropdown').forEach(d=>d.classList.remove('open'));
});

function applyFilters(){
  const result = DATA.filter(d =>
    (!SEL.eixo.size  || SEL.eixo.has(d.n1)) &&
    (!SEL.plano.size || SEL.plano.has(d.n2)) &&
    (!SEL.owner.size || SEL.owner.has(d.owner))
  );
  document.getElementById('count').textContent = result.length;
  document.getElementById('output').textContent =
    'Eixos: '+([...SEL.eixo].join(', ')||'todos')+
    '\nPlanos: '+([...SEL.plano].join(', ')||'todos')+
    '\nOwners: '+([...SEL.owner].join(', ')||'todos');
}

function resetAll(){
  Object.keys(SEL).forEach(k=>SEL[k].clear());
  init(); applyFilters();
}

function init(){
  buildDd('eixo',  [...new Set(DATA.map(d=>d.n1))].sort());
  buildDd('plano', [...new Set(DATA.map(d=>d.n2))].sort());
  buildDd('owner', [...new Set(DATA.map(d=>d.owner))].sort());
  ['eixo','plano','owner'].forEach(updateLabel);
  applyFilters();
}

init();
</script>
</body>
</html>
